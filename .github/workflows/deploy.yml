name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, bcmath, pdo_mysql, fileinfo, openssl, tokenizer, ctype, json
          coverage: none

      - name: Install Composer dependencies
        run: |
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate APP_KEY if needed
        id: app_key
        run: |
          if [ -z "${{ secrets.APP_KEY }}" ]; then
            APP_KEY=$(php artisan key:generate --show)
            echo "key_generated=true" >> $GITHUB_OUTPUT
            echo "APP_KEY=$APP_KEY" >> $GITHUB_ENV
          else
            echo "key_generated=false" >> $GITHUB_OUTPUT
            echo "APP_KEY=${{ secrets.APP_KEY }}" >> $GITHUB_ENV
          fi

      - name: Prepare APP_URL
        id: app_url
        run: |
          if [ -n "${{ secrets.APP_URL }}" ] && [ "${{ secrets.APP_URL }}" != "" ]; then
            echo "url=${{ secrets.APP_URL }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://${{ secrets.APP_DOMAIN }}/api" >> $GITHUB_OUTPUT
          fi

      - name: Create production .env file
        run: |
          cat > .env << EOF
          APP_NAME="${{ secrets.APP_NAME || 'Laravel' }}"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY || env.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ steps.app_url.outputs.url }}
          APP_TIMEZONE=${{ secrets.APP_TIMEZONE || 'UTC' }}
          APP_LOCALE=${{ secrets.APP_LOCALE || 'en' }}
          APP_FALLBACK_LOCALE=${{ secrets.APP_FALLBACK_LOCALE || 'en' }}
          APP_FAKER_LOCALE=${{ secrets.APP_FAKER_LOCALE || 'en_US' }}

          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync

          DB_CONNECTION=${{ secrets.DB_CONNECTION || 'mysql' }}
          DB_HOST=${{ secrets.DB_HOST || 'localhost' }}
          DB_PORT=${{ secrets.DB_PORT || '3306' }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          EOF

      - name: Create deployment package
        run: |
          mkdir -p deploy
          # Copy all necessary files
          rsync -av --progress \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env.example' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='DEPLOYMENT.md' \
            --exclude='DEPLOYMENT_CHECKLIST.md' \
            --exclude='docker' \
            --exclude='docker-compose.yml' \
            --exclude='phpunit.xml' \
            --exclude='phpstan.neon' \
            --exclude='pint.json' \
            --exclude='.phpunit.cache' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            ./ deploy/

      - name: Deploy to cPanel via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.CPANEL_REMOTE_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env.example
            **/tests/**
            **/docker/**
            **/docker-compose.yml
            **/phpunit.xml
            **/phpstan.neon
            **/pint.json
            **/.phpunit.cache
            **/storage/logs/*
            **/storage/framework/cache/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*
          dangerous-clean-slate: false

      - name: Check SSH configuration
        id: check_ssh
        run: |
          if [ -n "${{ secrets.CPANEL_SSH_HOST }}" ] && [ -n "${{ secrets.CPANEL_SSH_KEY }}" ]; then
            echo "ssh_configured=true" >> $GITHUB_OUTPUT
          else
            echo "ssh_configured=false" >> $GITHUB_OUTPUT
          fi

      - name: Run post-deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        if: steps.check_ssh.outputs.ssh_configured == 'true'
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.CPANEL_REMOTE_PATH }}

            # Verify .env file exists
            if [ ! -f .env ]; then
              echo "Error: .env file not found!"
              exit 1
            fi

            # Set proper permissions
            chmod -R 775 storage bootstrap/cache
            chmod 644 .env

            # Install/update dependencies (if not uploaded)
            composer install --no-dev --optimize-autoloader --no-interaction || true

            # Clear all caches first
            php artisan optimize:clear || true

            # Run migrations
            php artisan migrate --force || true

            # Cache configuration for production
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true
            php artisan event:cache || true

            # Create storage symlink if needed
            php artisan storage:link || true

            # Final optimization
            php artisan optimize || true

      - name: Post-deployment instructions (if SSH not configured)
        if: steps.check_ssh.outputs.ssh_configured == 'false'
        run: |
          echo "::notice::SSH not configured. Please run these commands manually via cPanel Terminal:"
          echo "::notice::cd ${{ secrets.CPANEL_REMOTE_PATH }}"
          echo "::notice::chmod -R 775 storage bootstrap/cache && chmod 644 .env"
          echo "::notice::php artisan migrate --force"
          echo "::notice::php artisan config:cache && php artisan route:cache && php artisan view:cache"
          echo "::notice::php artisan storage:link"
          echo "::notice::php artisan optimize"
          echo ""
          echo "::warning::To enable SSH automation, add GitHub Actions IP ranges in cPanel → SSH Authorization"
          echo "::warning::Get IP ranges from: https://api.github.com/meta (look for 'actions' key)"

      - name: Cleanup
        run: |
          rm -rf deploy/
